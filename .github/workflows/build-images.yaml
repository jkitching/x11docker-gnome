name: Build and push images

on:
  push:
    branches: [master]
  schedule:
    # Weekly rebuild so images pick up package updates
    - cron: '17 4 * * 1'
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set.outputs.images }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: echo "images=$(ls *.Dockerfile | sed 's/\.Dockerfile$//' | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"

  build:
    needs: list
    runs-on: ubuntu-latest
    name: ${{ matrix.image }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.list.outputs.images) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: >
          docker build
          -t "ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest"
          -f "${{ matrix.image }}.Dockerfile" .

      - name: Push
        run: docker push "ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest"
